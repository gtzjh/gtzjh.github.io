<!-- Search Input -->
<div id="search-container" class="search-container">
  <input type="text" id="search-input" placeholder="Search..." />
  <button onclick="performSearch()">Search</button>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/lunr.js/2.3.9/lunr.min.js"></script>
<script>
  // Adjust links based on the current environment
  document.addEventListener('DOMContentLoaded', function() {
    const basePath = window.location.hostname === 'gtzjh.github.io' ? '/demon/' : '/';
    document.querySelectorAll('.navbar-nav a').forEach(link => {
      link.href = basePath + link.getAttribute('href');
    });
  });

  let idx;
  let searchData;

  // Load the search index
  fetch('search-index.json')
    .then(response => response.json())
    .then(data => {
      searchData = data;
      idx = lunr(function () {
        this.ref('id');
        this.field('title');
        this.field('content');

        searchData.forEach(function (doc) {
          this.add(doc);
        }, this);
      });
    });

  document.getElementById('search-icon').addEventListener('click', function() {
    document.getElementById('search-container').classList.toggle('active');
  });

  function performSearch() {
    const searchTerm = document.getElementById('search-input').value.toLowerCase();
    if (searchTerm) {
      const results = idx.search(searchTerm);
      if (results.length > 0) {
        let resultHtml = 'Search results:<br>';
        results.forEach(result => {
          const item = searchData.find(d => d.id === result.ref);
          resultHtml += `<a href="${item.url}">${item.title}</a><br>`;
        });
        alert(resultHtml);
      } else {
        alert('No results found.');
      }
    } else {
      alert('Please enter a search term.');
    }
  }
</script>
