<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>增加左右空白的网页</title>
    <link href="css/navbar.css" rel="stylesheet" />
    <style>
        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
        }
        .container {
            width: 50%; /* 你可以调整这个值来增加或减少空白 */
            max-width: 1200px; /* 你可以设置一个最大宽度 */
            margin: 0 auto;
            background-color: #f0f0f0; /* 只是为了演示，设置一个背景颜色 */
        }
    </style>
</head>
<body>
    <div id="navbar-placeholder"></div>
    <script>
      fetch('navbar.html')
        .then(response => response.text())
        .then(data => {
          document.getElementById('navbar-placeholder').innerHTML = data;
        });
    </script>

    <div class="container">
        <h1>欢迎来到我的网页</h1>
        <p>这是一个示例网页，展示如何增加左右的空白。</p>
    </div>
</body>
</html>
