<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0" />
    <title>CEPU/PPRFS (2023.A2.059.23C)</title>
    <link
      href="../css/bootstrap.min.css"
      rel="stylesheet" />
    <link
      href="../css/style.css"
      rel="stylesheet" />
    <link
      href="../css/project-content.css"
      rel="stylesheet" />
    <link href="../css/navbar.css" rel="stylesheet" />
  </head>
  <body>
    <!-- Include the navigation bar -->
    <div id="navbar-placeholder"></div>
    <script>
      fetch('../navbar.html')
        .then(response => response.text())
        .then(data => {
          document.getElementById('navbar-placeholder').innerHTML = data;
          // Adjust links based on the current environment and directory
          let basePath = '/';
          if (window.location.hostname === 'gtzjh.github.io') {
            basePath = '/demon/';
          }
          // Remove 'students/' prefix for local development
          if (window.location.pathname.includes('/students/') && window.location.hostname !== 'gtzjh.github.io') {
            basePath = '../';
          }
          document.querySelectorAll('.navbar-nav a').forEach(link => {
            link.href = basePath + link.getAttribute('href');
          });
          // Adjust brand link
          const brandLink = document.querySelector('.navbar-brand');
          if (brandLink) {
            brandLink.href = basePath + 'index.html';
          }
        })
        .catch(error => console.error('Error loading navbar:', error));
    </script>

    <!-- Header Banner -->
    <header class="project-header">
      <div class="container">
        <h1>CEPU/PPRFS (2023.A2.059.23C)</h1>
      </div>
    </header>

    <!-- Project Content -->
    <main class="container project-content">
      <div class="project-profile">
        <div class="profile-image-container">
          <img
            src="../images/news_4_封面.jpg"
            alt="CEPU/PPRFS (2023.A2.059.23C)"
            class="profile-image" />
        </div>

        <div class="profile-info">
          <div class="info-section">
            <h3>Project Description</h3>
            <ul>
              <li>Description1.</li>
              <li>Description2.</li>
              <li>Description3.</li>
            </ul>
          </div>

          <div class="info-section">
            <h3>Project Details</h3>
            <ul>
              <li>Details1.</li>
              <li>Details2.</li>
              <li>Details3.</li>
            </ul>
          </div>
        </div>
      </div>
    </main>
  </body>
</html>
