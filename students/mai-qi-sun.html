<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0" />
    <title>Maiqi Sun - EASE</title>
    <link
      href="../css/bootstrap.min.css"
      rel="stylesheet" />
    <link
      href="../css/style.css"
      rel="stylesheet" />
    <link
      href="../css/student.css"
      rel="stylesheet" />
    <link href="../css/navbar.css" rel="stylesheet" />
  </head>
  <body>
    <!-- Include the navigation bar -->
    <div id="navbar-placeholder"></div>
    <script>
      fetch('../navbar.html')
        .then(response => response.text())
        .then(data => {
          document.getElementById('navbar-placeholder').innerHTML = data;
          // Adjust links based on the current environment and directory
          let basePath = '/';
          if (window.location.hostname === 'gtzjh.github.io') {
            basePath = '/';
          }
          if (window.location.pathname.includes('/students/') && window.location.hostname !== 'gtzjh.github.io') {
            basePath = '../';
          }
          document.querySelectorAll('.navbar-nav a').forEach(link => {
            link.href = basePath + link.getAttribute('href');
          });
          // Adjust brand link
          const brandLink = document.querySelector('.navbar-brand');
          if (brandLink) {
            brandLink.href = basePath + 'index.html';
          }
        })
        .catch(error => console.error('Error loading navbar:', error));
    </script>

    <!-- Header Banner -->
    <header class="student-header" style="background: none;">
      <div class="container">
        <h1>Maiqi Sun</h1>
      </div>
    </header>

    <!-- Student Content -->
    <main class="container student-content">
      <div class="student-profile">
        <div class="profile-image-container">
          <img
            src="../images/SMQ.jpg"
            alt="Maiqi Sun"
            class="profile-image" />
        </div>

        <div class="profile-info">
          <div class="info-section">
            <h3>Education</h3>
            <ul>
              <li>
                Hongkong Baptist University (PhD student)
              </li>
              <li>
                M.S. Environmental Science and Management, Hong Kong University of Science and Technology
              </li>
              <li>
                B.S. Atmospheric Sciences, Sun Yat-sen University
              </li>
            </ul>
          </div>

          <div class="info-section">
            <h3>Short Bio</h3>
            <p>
              description.
            </p>
          </div>
        </div>
      </div>
    </main>
  </body>
</html>
